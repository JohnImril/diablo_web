name: CI

on:
    pull_request:

permissions:
    contents: read

jobs:
    checks:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
            - run: npm ci
            - run: npm run lint
            - run: npm run test
            - run: npm run build
